name: Million-App-Base-AutoBuilder

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 第一步：运行你改名后的 language 脚本，生成多语言 strings.xml
      - name: Initialize Languages
        run: python language_init.py

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 第二步：还原 Keystore 锁文件
      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release-key.jks

      # 第三步：安装云端 Gradle 环境
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      # 第四步：强行赋予权限并打包
      - name: Build Android App
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        # 如果你项目里万一有 gradlew 就用它，没有就用系统 gradle，这里用系统 gradle 最稳
        run: gradle assembleRelease

      # 第五步：产出 APK
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Million-Calendar-APK
          path: app/build/outputs/apk/release/*.apk
